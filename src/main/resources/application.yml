spring:
  application:
    name: erp-system
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/erp_system}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:ZmFrZS1kZW1vLXNlY3JldC1rZXktdGhhdC1tdXN0LWJlLTMyLWJ5dGVzLWxvbmc=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

server:
  port: ${SERVER_PORT:8080}
